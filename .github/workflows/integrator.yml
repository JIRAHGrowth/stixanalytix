# StixAnalytix Integrator
#
# Runs the Claude agent task templates from claude/tasks/ on a schedule,
# so work moves forward while Josh is asleep / in meetings / away.
#
# ============================================================================
# ONE-TIME SETUP — required before any of these jobs will work:
# ============================================================================
#
# 1. Add repo secret: ANTHROPIC_API_KEY
#    GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Get key from console.anthropic.com → API keys
#
# 2. (Later, for pilot_health_check job) add repo secret: SUPABASE_SERVICE_ROLE_KEY
#    Get from Supabase dashboard → Project settings → API → service_role key
#    NOT needed until Phase 0 ships and the video_jobs table exists.
#
# 3. Verify the action version. This workflow uses anthropics/claude-code-base-action
#    at the @beta tag. Check https://github.com/anthropics/claude-code-base-action
#    for the current stable tag and update if needed.
#
# 4. Permissions: this workflow needs `contents: write` to commit MORNING_BRIEF.md
#    and other generated files back to the repo. Already set below.
#
# ============================================================================
# SCHEDULE NOTES
# ============================================================================
#
# GitHub Actions cron runs in UTC. The times below assume Josh is on Pacific
# Time (PT). Adjust the UTC values if you're in a different timezone, or want
# different local times. Off-minutes (e.g. :13, :37) are intentional — they
# avoid the global :00 thundering-herd on shared GitHub runners.
#
#   Job                     Local (PT)    UTC cron
#   nightly_build           02:13         "13 9 * * *"
#   morning_brief           07:07         "7 14 * * *"
#   pilot_health_check      07:37         "37 14 * * *"
#   competitor_watch (Mon)  09:23         "23 16 * * 1"
#   backlog_grooming (Fri)  09:33         "33 16 * * 5"
#
# All jobs can also be triggered manually via the Actions tab → Run workflow.

name: Integrator

on:
  schedule:
    - cron: "13 9 * * *"      # nightly_build  — 02:13 PT
    - cron: "7 14 * * *"      # morning_brief  — 07:07 PT
    - cron: "37 14 * * *"     # pilot_health   — 07:37 PT
    - cron: "23 16 * * 1"     # competitor     — Mon 09:23 PT
    - cron: "33 16 * * 5"     # backlog        — Fri 09:33 PT
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: true
        type: choice
        options:
          - nightly_build
          - morning_brief
          - pilot_health_check
          - competitor_watch
          - backlog_grooming

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # nightly_build — 02:13 PT
  # ---------------------------------------------------------------------------
  nightly_build:
    if: github.event.schedule == '13 9 * * *' || github.event.inputs.task == 'nightly_build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Run nightly build task
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: claude/tasks/nightly_build.md
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
      - name: Commit and push if changed
        run: |
          git config user.name "stix-integrator-bot"
          git config user.email "integrator@stixanalytix.local"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "chore(integrator): nightly build artifacts"
            git push
          fi

  # ---------------------------------------------------------------------------
  # morning_brief — 07:07 PT
  # ---------------------------------------------------------------------------
  morning_brief:
    if: github.event.schedule == '7 14 * * *' || github.event.inputs.task == 'morning_brief'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run morning brief task
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: claude/tasks/morning_brief.md
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
      - name: Commit and push if changed
        run: |
          git config user.name "stix-integrator-bot"
          git config user.email "integrator@stixanalytix.local"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "chore(integrator): morning brief"
            git push
          fi

  # ---------------------------------------------------------------------------
  # pilot_health_check — 07:37 PT
  # No-op until video_jobs table exists. Requires SUPABASE_SERVICE_ROLE_KEY.
  # ---------------------------------------------------------------------------
  pilot_health_check:
    if: github.event.schedule == '37 14 * * *' || github.event.inputs.task == 'pilot_health_check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run pilot health check task
        uses: anthropics/claude-code-base-action@beta
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: claude/tasks/pilot_health_check.md
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
      - name: Commit and push if changed
        run: |
          git config user.name "stix-integrator-bot"
          git config user.email "integrator@stixanalytix.local"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "chore(integrator): pilot health check"
            git push
          fi

  # ---------------------------------------------------------------------------
  # competitor_watch — Monday 09:23 PT
  # ---------------------------------------------------------------------------
  competitor_watch:
    if: github.event.schedule == '23 16 * * 1' || github.event.inputs.task == 'competitor_watch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run competitor watch task
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: claude/tasks/competitor_watch.md
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
      - name: Commit and push if changed
        run: |
          git config user.name "stix-integrator-bot"
          git config user.email "integrator@stixanalytix.local"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "chore(integrator): competitor watch update"
            git push
          fi

  # ---------------------------------------------------------------------------
  # backlog_grooming — Friday 09:33 PT
  # ---------------------------------------------------------------------------
  backlog_grooming:
    if: github.event.schedule == '33 16 * * 5' || github.event.inputs.task == 'backlog_grooming'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run backlog grooming task
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: claude/tasks/backlog_grooming.md
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
      - name: Commit and push if changed
        run: |
          git config user.name "stix-integrator-bot"
          git config user.email "integrator@stixanalytix.local"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "chore(integrator): backlog grooming proposal"
            git push
          fi
